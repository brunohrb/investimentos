<svg xmlns="http://www.w3.org/2000/svg" width="120" height="36" viewBox="0 0 120 36">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- losango esquerdo -->
  <polygon points="6,18 11,13 16,18 11,23" fill="none" stroke="url(#g)" stroke-width="1.3" opacity="0.75"/>
  <circle cx="11" cy="18" r="1.8" fill="url(#g)"/>
  <!-- texto -->
  <text x="60" y="24" font-family="'Segoe UI','Inter',Arial,sans-serif" font-size="22" font-weight="900" fill="url(#g)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">BEM</text>
  <!-- losango direito -->
  <polygon points="104,18 109,13 114,18 109,23" fill="none" stroke="url(#g)" stroke-width="1.3" opacity="0.75"/>
  <circle cx="109" cy="18" r="1.8" fill="url(#g)"/>
  <!-- linha inferior -->
  <rect x="16" y="30" width="88" height="1" rx="1" fill="url(#gBar)"/>
</svg>
