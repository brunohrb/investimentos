name: Sync Investimentos (Pluggy)

on:
  # Roda todo dia às 7h horário de Brasília (10h UTC)
  schedule:
    - cron: '0 10 * * 1-5'   # seg-sex (dias úteis)
  # Permite rodar manualmente pelo GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  sync:
    name: Buscar dados das corretoras
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar sync do Pluggy
        env:
          PLUGGY_CLIENT_ID:     ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET: ${{ secrets.PLUGGY_CLIENT_SECRET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
        run: node scripts/sync-pluggy.js
