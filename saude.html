<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitalTrack AI - Saúde Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00D9B1;
            --secondary: #FF6B9D;
            --dark: #0F1419;
            --dark-lighter: #1C2128;
            --dark-card: #252D38;
            --text: #E8EAED;
            --text-muted: #9CA3AF;
            --success: #4ADE80;
            --error: #EF4444;
            --gradient-1: linear-gradient(135deg, #00D9B1 0%, #00B894 100%);
            --gradient-ai: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 1rem; }

        header {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 20, 25, 0.95);
            backdrop-filter: blur(10px);
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }
        
        .logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary { background: var(--gradient-1); color: var(--dark); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
        .btn-ai { background: var(--gradient-ai); color: white; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3); }
        .btn-block { width: 100%; margin-top: 1rem; }

        .nav-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--dark-lighter);
            padding: 0.75rem 0.5rem;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            gap: 0.25rem;
            transition: all 0.3s;
            padding: 0.5rem;
            border-radius: 12px;
            flex: 1;
        }

        .nav-tab.active { color: var(--primary); }

        .section { display: none; padding: 1.5rem 0; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--dark-card);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
            .logo { font-size: 2rem; }
            .nav-container { position: relative; border-top: none; background: transparent; padding: 2rem 0; }
            .nav-tabs { background: var(--dark-lighter); border-radius: 16px; padding: 0.5rem; max-width: 100%; }
            .nav-tab { flex-direction: row; font-size: 0.9rem; padding: 1rem; gap: 0.5rem; }
            body { padding-bottom: 0; }
        }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); }
        
        input, select, textarea {
            padding: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--dark-lighter);
            color: var(--text);
            border-radius: 12px;
            font-size: 1rem;
            width: 100%;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--dark-lighter); padding: 1rem; border-radius: 16px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); font-family: 'Archivo Black', sans-serif; }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .item {
            background: var(--dark-lighter);
            padding: 1rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark-card);
            border-radius: 24px 24px 0 0;
            padding: 1.5rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .ai-loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-chat-container { display: flex; flex-direction: column; gap: 1rem; }
        .ai-question { background: rgba(102, 126, 234, 0.1); padding: 1rem; border-radius: 12px; border-left: 4px solid #667eea; }
        .ai-options { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
        .ai-option-btn { padding: 0.75rem; background: var(--dark-lighter); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text); text-align: left; cursor: pointer; }
        
        .chart-container { width: 100%; height: 250px; margin-top: 1rem; }
        .notification { position: fixed; top: 1rem; left: 1rem; right: 1rem; background: var(--dark-card); padding: 1rem; border-radius: 12px; border-left: 4px solid var(--success); z-index: 3000; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1 class="logo">VitalTrack AI</h1>
                <button class="btn btn-danger" onclick="clearAll()">🗑️</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="nav-container">
            <nav class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('perfil')">👤 Perfil</button>
                <button class="nav-tab" onclick="switchTab('bio')">🔬 Bio</button>
                <button class="nav-tab" onclick="switchTab('exames')">📄 Exames</button>
                <button class="nav-tab" onclick="switchTab('treinos')">💪 Treinos</button>
                <button class="nav-tab" onclick="switchTab('dieta')">🥗 Dieta</button>
            </nav>
        </div>

        <!-- SEÇÃO PERFIL -->
        <div id="perfil-section" class="section active">
            <div class="card">
                <h2 class="card-title">Dados de Saúde</h2>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-label">Peso</div><div class="stat-value" id="peso-display">--</div></div>
                    <div class="stat-card"><div class="stat-label">Altura</div><div class="stat-value" id="altura-display">--</div></div>
                    <div class="stat-card"><div class="stat-label">IMC</div><div class="stat-value" id="imc-display">--</div></div>
                    <div class="stat-card"><div class="stat-label">Idade</div><div class="stat-value" id="idade-display">--</div></div>
                </div>
                <form onsubmit="savePerfil(event)">
                    <div class="form-grid">
                        <div class="form-group"><label>Nome</label><input type="text" id="p-nome" required></div>
                        <div class="form-group"><label>Idade</label><input type="number" id="p-idade" required></div>
                        <div class="form-group"><label>Sexo</label><select id="p-sexo"><option value="M">Masculino</option><option value="F">Feminino</option></select></div>
                        <div class="form-group"><label>Peso (kg)</label><input type="number" step="0.1" id="p-peso" required></div>
                        <div class="form-group"><label>Altura (cm)</label><input type="number" id="p-altura" required></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Salvar Dados</button>
                </form>
            </div>
        </div>

        <!-- SEÇÃO BIOIMPEDÂNCIA -->
        <div id="bio-section" class="section">
            <div class="card">
                <div class="card-title">
                    Bioimpedância
                    <button class="btn btn-ai" onclick="openBioDashboard()">✨ Evolução IA</button>
                </div>
                <form onsubmit="saveBio(event)">
                    <div class="form-grid">
                        <div class="form-group"><label>Data</label><input type="date" id="bioData" required></div>
                        <div class="form-group"><label>% Gordura</label><input type="number" step="0.1" id="bioGordura" required></div>
                        <div class="form-group"><label>Massa (kg)</label><input type="number" step="0.1" id="bioMassa" required></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Adicionar Registro</button>
                </form>
                <div id="bioList" class="item-list" style="margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- SEÇÃO EXAMES -->
        <div id="exames-section" class="section">
            <div class="card">
                <div class="card-title">
                    Exames
                    <button class="btn btn-ai" onclick="analisarExamesIA()">✨ Estudo IA</button>
                </div>
                <form onsubmit="saveExame(event)">
                    <div class="form-grid">
                        <div class="form-group"><label>Data</label><input type="date" id="exData" required></div>
                        <div class="form-group"><label>Exame</label><input type="text" id="exNome" placeholder="Ex: Hemograma" required></div>
                        <div class="form-group"><label>Arquivo</label><input type="file" id="exFile"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Salvar Exame</button>
                </form>
                <div id="exList" class="item-list" style="margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- SEÇÃO TREINOS -->
        <div id="treinos-section" class="section">
            <div class="card">
                <div class="card-title">
                    Treinos
                    <button class="btn btn-ai" onclick="iniciarChatTreino()">✨ Montar com IA</button>
                </div>
                <div id="treinoList" class="item-list"></div>
                <button class="btn btn-primary btn-block" onclick="openModal('treinoMan')">+ Treino Manual</button>
            </div>
        </div>

        <!-- SEÇÃO DIETA -->
        <div id="dieta-section" class="section">
            <div class="card">
                <div class="card-title">Dieta e Nutrição</div>
                <div id="dietaList" class="item-list"></div>
                <p style="text-align:center; color:var(--text-muted); font-size:0.9rem;">Funcionalidade de dieta em desenvolvimento.</p>
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <div id="bioDashboardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3 style="color:var(--primary)">Evolução Bioimpedância</h3>
                <button onclick="closeModal('bioDashboard')" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
            </div>
            <div class="chart-container"><canvas id="bioChart"></canvas></div>
            <div id="bioAiAnalysis" style="margin-top:1.5rem; padding:1rem; background:var(--dark-lighter); border-radius:12px; font-size:0.9rem;"></div>
        </div>
    </div>

    <div id="aiChatModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3 style="color:var(--primary)">Assistente de Treino IA</h3>
                <button onclick="closeModal('aiChat')" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
            </div>
            <div id="aiChatContent" class="ai-chat-container"></div>
        </div>
    </div>

    <div id="treinoManModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h3 style="color:var(--primary)">Novo Treino Manual</h3>
                <button onclick="closeModal('treinoMan')" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
            </div>
            <form onsubmit="saveTreinoManual(event)">
                <div class="form-grid">
                    <div class="form-group"><label>Nome</label><input type="text" id="tm-nome" required></div>
                    <div class="form-group"><label>Exercícios</label><textarea id="tm-ex" rows="4"></textarea></div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Salvar</button>
            </form>
        </div>
    </div>

    <script>
        const DB = { perfil: 'vt_perfil', bio: 'vt_bio', exames: 'vt_exames', treinos: 'vt_treinos' };
        const save = (key, data) => localStorage.setItem(key, JSON.stringify(data));
        const load = (key) => {
            const val = localStorage.getItem(key);
            if (!val) return [];
            try { return JSON.parse(val); } catch(e) { return []; }
        };

        function notify(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.innerText = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            const target = document.getElementById(tab + '-section');
            if (target) target.classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo(0,0);
        }

        function openModal(id) { document.getElementById(id + 'Modal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id + 'Modal').classList.remove('active'); }

        // PERFIL
        function savePerfil(e) {
            e.preventDefault();
            const data = {
                nome: document.getElementById('p-nome').value,
                idade: document.getElementById('p-idade').value,
                sexo: document.getElementById('p-sexo').value,
                peso: document.getElementById('p-peso').value,
                altura: document.getElementById('p-altura').value
            };
            localStorage.setItem(DB.perfil, JSON.stringify(data));
            loadPerfil();
            notify('Perfil salvo!');
        }

        function loadPerfil() {
            const pVal = localStorage.getItem(DB.perfil);
            if (!pVal) return;
            const p = JSON.parse(pVal);
            document.getElementById('p-nome').value = p.nome || '';
            document.getElementById('p-idade').value = p.idade || '';
            document.getElementById('p-sexo').value = p.sexo || 'M';
            document.getElementById('p-peso').value = p.peso || '';
            document.getElementById('p-altura').value = p.altura || '';
            document.getElementById('peso-display').innerText = (p.peso || '--') + 'kg';
            document.getElementById('altura-display').innerText = (p.altura || '--') + 'cm';
            document.getElementById('idade-display').innerText = p.idade || '--';
            if (p.peso && p.altura) {
                document.getElementById('imc-display').innerText = (p.peso / ((p.altura/100)**2)).toFixed(1);
            }
        }

        // BIO
        function saveBio(e) {
            e.preventDefault();
            const list = load(DB.bio);
            list.push({ id: Date.now(), data: document.getElementById('bioData').value, gordura: document.getElementById('bioGordura').value, massa: document.getElementById('bioMassa').value });
            list.sort((a,b) => new Date(b.data) - new Date(a.data));
            save(DB.bio, list);
            e.target.reset();
            loadBio();
            notify('Registro adicionado!');
        }

        function loadBio() {
            const list = load(DB.bio);
            const container = document.getElementById('bioList');
            container.innerHTML = list.length ? list.map(b => `
                <div class="item">
                    <div>
                        <h4>${new Date(b.data).toLocaleDateString('pt-BR')}</h4>
                        <p>${b.gordura}% Gordura | ${b.massa}kg Massa</p>
                    </div>
                    <button class="btn btn-danger" style="padding:0.5rem" onclick="deleteItem('${DB.bio}', ${b.id}, loadBio)">🗑️</button>
                </div>
            `).join('') : '<p style="text-align:center; color:var(--text-muted);">Nenhum registro de bioimpedância.</p>';
        }

        // EXAMES
        function saveExame(e) {
            e.preventDefault();
            const list = load(DB.exames);
            list.push({ id: Date.now(), data: document.getElementById('exData').value, nome: document.getElementById('exNome').value });
            save(DB.exames, list);
            e.target.reset();
            loadExames();
            notify('Exame salvo!');
        }

        function loadExames() {
            const list = load(DB.exames);
            const container = document.getElementById('exList');
            container.innerHTML = list.length ? list.map(ex => `
                <div class="item">
                    <div><h4>${ex.nome}</h4><p>${new Date(ex.data).toLocaleDateString('pt-BR')}</p></div>
                    <button class="btn btn-danger" style="padding:0.5rem" onclick="deleteItem('${DB.exames}', ${ex.id}, loadExames)">🗑️</button>
                </div>
            `).join('') : '<p style="text-align:center; color:var(--text-muted);">Nenhum exame cadastrado.</p>';
        }

        function deleteItem(key, id, cb) {
            if(confirm('Deseja excluir este item?')) {
                const list = load(key).filter(i => i.id !== id);
                save(key, list);
                cb();
                notify('Excluído!');
            }
        }

        // IA BIOIMPEDÂNCIA
        let bioChart = null;
        async function openBioDashboard() {
            const list = load(DB.bio);
            if(list.length === 0) return alert('Adicione registros de bioimpedância primeiro!');
            openModal('bioDashboard');
            
            const sorted = [...list].sort((a,b) => new Date(a.data) - new Date(b.data));
            const ctx = document.getElementById('bioChart').getContext('2d');
            if(bioChart) bioChart.destroy();
            bioChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sorted.map(d => new Date(d.data).toLocaleDateString('pt-BR')),
                    datasets: [
                        { label: '% Gordura', data: sorted.map(d => d.gordura), borderColor: '#FF6B9D', tension: 0.3 },
                        { label: 'Massa (kg)', data: sorted.map(d => d.massa), borderColor: '#00D9B1', tension: 0.3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            document.getElementById('bioAiAnalysis').innerHTML = '<span class="ai-loading"></span> IA Analisando evolução...';
            try {
                const res = await callIA(`Analise estes dados de bioimpedância e dê um feedback curto e motivador sobre a evolução da gordura e massa muscular: ${JSON.stringify(sorted)}`);
                document.getElementById('bioAiAnalysis').innerHTML = `<strong>Análise IA:</strong><br>${res}`;
            } catch(e) { document.getElementById('bioAiAnalysis').innerText = 'Não foi possível gerar a análise agora.'; }
        }

        // IA TREINO
        let chatStep = 0;
        let chatData = {};
        function iniciarChatTreino() {
            if(!localStorage.getItem(DB.perfil)) {
                alert('Preencha seu perfil primeiro!');
                switchTab('perfil');
                return;
            }
            openModal('aiChat');
            chatStep = 0;
            chatData = {};
            proximoPassoChat();
        }

        function proximoPassoChat() {
            const cont = document.getElementById('aiChatContent');
            const steps = [
                { q: 'Qual seu foco atual?', opts: ['Hipertrofia', 'Emagrecimento', 'Força', 'Resistência'], key: 'foco' },
                { q: 'Quantos dias na semana?', opts: ['3 dias', '4 dias', '5 dias', '6 dias'], key: 'dias' },
                { q: 'Onde vai treinar?', opts: ['Academia', 'Em Casa', 'Parque'], key: 'local' }
            ];

            if(chatStep < steps.length) {
                const s = steps[chatStep];
                cont.innerHTML = `<div class="ai-question">${s.q}</div><div class="ai-options">${s.opts.map(o => `<button class="ai-option-btn" onclick="setChatVal('${s.key}', '${o}')">${o}</button>`).join('')}</div>`;
            } else {
                gerarTreinoIA();
            }
        }

        function setChatVal(key, val) {
            chatData[key] = val;
            chatStep++;
            proximoPassoChat();
        }

        async function gerarTreinoIA() {
            const cont = document.getElementById('aiChatContent');
            cont.innerHTML = '<div style="text-align:center"><span class="ai-loading"></span><p>Criando seu treino personalizado...</p></div>';
            try {
                const perfil = localStorage.getItem(DB.perfil);
                const bio = JSON.stringify(load(DB.bio).slice(0,3));
                const exames = JSON.stringify(load(DB.exames).map(e => e.nome));
                
                const prompt = `Crie um plano de treino para este perfil: ${perfil}. 
                Bioimpedância recente: ${bio}. 
                Exames: ${exames}. 
                Preferências: ${JSON.stringify(chatData)}.
                
                REGRAS DE RESPOSTA:
                - Use o marcador [TREINO] para iniciar cada treino.
                - Use o marcador [FIM] para encerrar cada treino.
                - Exemplo: [TREINO] Nome do Treino | Exercícios aqui [FIM]`;
                
                const res = await callIA(prompt, false);
                
                // Parser simples baseado em marcadores de texto
                const treinosEncontrados = res.split('[TREINO]').filter(t => t.includes('[FIM]'));
                
                if (treinosEncontrados.length === 0) {
                    // Fallback se a IA não usar marcadores
                    const list = load(DB.treinos);
                    list.push({ 
                        id: Date.now(), 
                        nome: 'Plano de Treino IA', 
                        ex: res, 
                        tipo: 'IA - ' + (chatData.foco || '') 
                    });
                    save(DB.treinos, list);
                } else {
                    const list = load(DB.treinos);
                    treinosEncontrados.forEach(t => {
                        const content = t.split('[FIM]')[0].trim();
                        const parts = content.split('|');
                        list.push({ 
                            id: Date.now() + Math.random(), 
                            nome: parts[0].trim() || 'Treino IA', 
                            ex: parts.slice(1).join('|').trim() || content, 
                            tipo: 'IA - ' + (chatData.foco || '') 
                        });
                    });
                    save(DB.treinos, list);
                }

                loadTreinos();
                cont.innerHTML = '<div style="text-align:center; color:var(--success);">✨ Treino gerado com sucesso!<br><br><button class="btn btn-primary" onclick="closeModal(\'aiChat\')">Ver Treinos</button></div>';
                notify('Treinos gerados!');
            } catch(e) { 
                console.error(e);
                cont.innerHTML = '<div style="text-align:center; color:var(--error);"><p>Erro ao gerar treino. Tente novamente.</p><br><button class="btn btn-primary" onclick="iniciarChatTreino()">Tentar Novamente</button></div>'; 
            }
        }

        async function analisarExamesIA() {
            const list = load(DB.exames);
            if(list.length === 0) return alert('Adicione exames primeiro!');
            
            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.innerHTML = `<div class="modal-content"><h3 style="color:var(--primary)">Estudo de Exames IA</h3><div id="exRes" style="margin-top:1rem; font-size:0.9rem; max-height: 300px; overflow-y: auto;"><span class="ai-loading"></span> Estudando exames e tendências...</div><button class="btn btn-primary btn-block" style="margin-top:1rem;" onclick="this.closest('.modal').remove()">Fechar</button></div>`;
            document.body.appendChild(modal);
            
            try {
                const perfil = localStorage.getItem(DB.perfil);
                const res = await callIA(`Estude estes exames laboratoriais do usuário (${perfil}) e diga se houve melhora ou piora nas tendências de saúde: ${JSON.stringify(list)}`);
                document.getElementById('exRes').innerHTML = res.replace(/\n/g, '<br>');
            } catch(e) { document.getElementById('exRes').innerText = 'Erro na análise dos exames.'; }
        }

        async function callIA(prompt, isJson = false) {
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window.OPENAI_API_KEY}` },
                    body: JSON.stringify({
                        model: 'gpt-4.1-mini',
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.choices[0].message.content;
            } catch(e) {
                console.error("Erro na chamada da IA:", e);
                throw e;
            }
        }

        function loadTreinos() {
            const list = load(DB.treinos);
            const container = document.getElementById('treinoList');
            container.innerHTML = list.length ? list.map(t => `
                <div class="item">
                    <div style="flex:1">
                        <h4>${t.nome}</h4>
                        <p style="color:var(--primary); font-size:0.7rem; font-weight:bold;">${t.tipo || 'Manual'}</p>
                        <p style="white-space:pre-line; font-size:0.8rem; margin-top:0.5rem;">${t.ex}</p>
                    </div>
                    <button class="btn btn-danger" style="padding:0.5rem; margin-left:10px;" onclick="deleteItem('${DB.treinos}', ${t.id}, loadTreinos)">🗑️</button>
                </div>
            `).join('') : '<p style="text-align:center; color:var(--text-muted);">Nenhum treino cadastrado.</p>';
        }

        function saveTreinoManual(e) {
            e.preventDefault();
            const list = load(DB.treinos);
            list.push({ id: Date.now(), nome: document.getElementById('tm-nome').value, ex: document.getElementById('tm-ex').value, tipo: 'Manual' });
            save(DB.treinos, list);
            closeModal('treinoMan');
            e.target.reset();
            loadTreinos();
            notify('Treino salvo!');
        }

        function clearAll() { 
            if(confirm('Isso apagará TODOS os seus dados salvos. Deseja continuar?')) { 
                localStorage.clear(); 
                location.reload(); 
            } 
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPerfil(); 
            loadBio(); 
            loadExames(); 
            loadTreinos();
        });
    </script>
</body>
</html>
