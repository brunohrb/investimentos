<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QPastel – Bolos, Doces & Salgados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #E04E1A;
    --brand-dark: #B83A0E;
    --brand-light: #F87240;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --bg: #FDF5EE;
    --card-bg: #FFFFFF;
    --text: #2A1A0E;
    --text-muted: #7A5C44;
    --border: #F0DDD0;
    --success: #2E8B57;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #8B0000 0%, #C0392B 40%, #E04E1A 80%, #D4531E 100%);
    padding: 24px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,160,80,0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(200,0,0,0.2) 0%, transparent 60%);
  }
  .logo-wrap { position:relative; z-index:1; }
  .logo-badge {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #F0A030, #E06010);
    border: 4px solid var(--gold);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    padding: 18px 36px 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 2px 8px rgba(255,200,100,0.3);
    position: relative;
  }
  .logo-badge::before {
    content: '★  ★';
    position: absolute;
    bottom: -18px;
    left: 50%; transform: translateX(-50%);
    background: var(--gold);
    color: var(--brand-dark);
    font-size: 10px;
    padding: 4px 18px;
    border-radius: 20px;
    letter-spacing: 6px;
    font-weight: 700;
  }
  .logo-badge h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2.6rem;
    color: var(--gold-light);
    text-shadow: 2px 2px 8px rgba(100,20,0,0.6);
    line-height: 1;
  }
  .logo-badge p {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(255,240,200,0.95);
    margin-top: 4px;
    text-transform: uppercase;
  }
  .header-tagline {
    position: relative; z-index:1;
    margin-top: 28px;
    color: rgba(255,240,220,0.9);
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  /* CART BUTTON */
  .cart-fab {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 200;
    background: var(--brand);
    color: #fff;
    border: none; cursor: pointer;
    border-radius: 50px;
    padding: 14px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 6px 24px rgba(224,78,26,0.45);
    transition: all 0.2s;
  }
  .cart-fab:hover { background: var(--brand-dark); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(224,78,26,0.5); }
  .cart-fab .badge {
    background: var(--gold); color: #2A1A0E;
    border-radius: 50%; width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    font-size:0.75rem; font-weight:700;
  }

  /* SEARCH & FILTERS */
  .controls {
    max-width: 860px; margin: 0 auto;
    padding: 24px 20px 0;
  }
  .search-box {
    position: relative; margin-bottom: 16px;
  }
  .search-box input {
    width: 100%;
    padding: 14px 20px 14px 46px;
    border: 2px solid var(--border);
    border-radius: 50px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .search-box input:focus { outline: none; border-color: var(--brand-light); }
  .search-box span { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:1.1rem; }
  .cats { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .cats::-webkit-scrollbar { display:none; }
  .cat-btn {
    flex-shrink:0;
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid var(--border);
    background: white;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-btn.active, .cat-btn:hover {
    background: var(--brand); color: white; border-color: var(--brand);
  }

  /* MENU GRID */
  .menu-wrap { max-width: 860px; margin: 0 auto; padding: 20px; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--brand-dark);
    margin: 24px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .card-img {
    width:100%; height:150px;
    object-fit:cover; display:block;
    background: linear-gradient(135deg, #FDEBD0, #F5CBA7);
    display:flex; align-items:center; justify-content:center;
    font-size:3rem;
  }
  .card-body { padding: 14px; }
  .card-body h3 { font-size:0.95rem; font-weight:600; margin-bottom:4px; }
  .card-body p { font-size:0.8rem; color:var(--text-muted); margin-bottom:10px; line-height:1.4; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; }
  .price { font-weight:700; color:var(--brand); font-size:1.05rem; }
  .add-btn {
    background: var(--brand); color:white;
    border:none; border-radius:50px;
    padding: 6px 16px; font-size:0.85rem; font-weight:600;
    cursor:pointer; font-family:'DM Sans',sans-serif;
    transition: background 0.2s;
  }
  .add-btn:hover { background: var(--brand-dark); }
  .qty-ctrl { display:flex; align-items:center; gap:8px; }
  .qty-ctrl button {
    width:28px; height:28px; border-radius:50%;
    border:2px solid var(--brand);
    background:transparent; color:var(--brand);
    font-size:1.1rem; cursor:pointer; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s;
  }
  .qty-ctrl button:hover { background:var(--brand); color:white; }
  .qty-ctrl span { font-weight:700; min-width:20px; text-align:center; }

  /* CART OVERLAY */
  .overlay {
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  }
  .overlay.open { display:block; }
  .cart-panel {
    position:fixed; top:0; right:-100%; z-index:400;
    width:min(420px,100vw); height:100vh;
    background:var(--bg);
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    display:flex; flex-direction:column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
  }
  .cart-panel.open { right:0; }
  .cart-header {
    background: linear-gradient(135deg, #8B0000, #E04E1A);
    color:white; padding:20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .cart-header h2 { font-family:'Playfair Display',serif; font-size:1.3rem; }
  .close-btn {
    background:rgba(255,255,255,0.2); border:none; color:white;
    width:32px; height:32px; border-radius:50%; font-size:1.1rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
  }
  .close-btn:hover { background:rgba(255,255,255,0.35); }
  .cart-items { flex:1; overflow-y:auto; padding:16px; }
  .cart-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .cart-empty div { font-size:3rem; margin-bottom:12px; }
  .cart-item {
    display:flex; gap:12px; align-items:center;
    background:white; border-radius:12px; padding:12px;
    margin-bottom:10px; border:1.5px solid var(--border);
  }
  .cart-item-emoji { font-size:1.8rem; flex-shrink:0; }
  .cart-item-info { flex:1; }
  .cart-item-info h4 { font-size:0.9rem; font-weight:600; }
  .cart-item-info p { font-size:0.8rem; color:var(--brand); font-weight:700; }
  .cart-item-qty { display:flex; align-items:center; gap:6px; }
  .cart-item-qty button {
    width:26px; height:26px; border-radius:50%;
    border:1.5px solid var(--brand); background:transparent; color:var(--brand);
    font-size:1rem; cursor:pointer; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .cart-item-qty button:hover { background:var(--brand); color:white; }
  .cart-item-qty span { font-weight:700; font-size:0.9rem; min-width:18px; text-align:center; }
  .cart-footer {
    padding:16px;
    border-top:2px solid var(--border);
    background:white;
  }
  .cart-total {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px;
  }
  .cart-total span { font-weight:700; font-size:1.1rem; }
  .cart-total strong { font-size:1.3rem; color:var(--brand); }

  /* ORDER FORM */
  .form-section { padding:0 16px 8px; }
  .form-group { margin-bottom:10px; }
  .form-group label { font-size:0.8rem; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:10px 14px;
    border:2px solid var(--border); border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--text);
    background:white; transition:border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--brand-light);
  }
  .form-group textarea { resize:none; height:60px; }
  .payment-opts { display:flex; gap:8px; }
  .pay-opt {
    flex:1; padding:8px; border:2px solid var(--border); border-radius:10px;
    text-align:center; cursor:pointer; font-size:0.8rem; font-weight:600;
    transition:all 0.2s; background:white;
  }
  .pay-opt.selected { border-color:var(--brand); background:rgba(224,78,26,0.07); color:var(--brand); }
  .pay-opt div { font-size:1.2rem; margin-bottom:4px; }

  .whatsapp-btn {
    width:100%; padding:14px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color:white; border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    transition: opacity 0.2s, transform 0.2s;
    margin-top:12px;
  }
  .whatsapp-btn:hover { opacity:0.92; transform:translateY(-1px); }
  .whatsapp-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .whatsapp-icon { font-size:1.3rem; }

  /* FOOTER */
  footer {
    text-align:center; padding:32px 20px;
    color:var(--text-muted); font-size:0.8rem;
    border-top:2px solid var(--border);
    margin-top:40px;
  }

  @media(max-width:480px) {
    .logo-badge h1 { font-size:2rem; }
    .grid { grid-template-columns: 1fr 1fr; gap:12px; }
    .card-img { height:120px; font-size:2.2rem; }
    .card-body { padding:10px; }
    .card-body p { display:none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <div class="logo-badge">
      <h1>QPastel</h1>
      <p>Bolos · Doces · Salgados</p>
    </div>
    <p class="header-tagline">🕐 Seg–Sáb das 8h às 20h &nbsp;|&nbsp; Curitiba – PR</p>
  </div>
</header>

<!-- CONTROLES -->
<div class="controls">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar no cardápio..." oninput="filterMenu()">
  </div>
  <div class="cats">
    <button class="cat-btn active" onclick="filterCat('todos',this)">🍽️ Todos</button>
    <button class="cat-btn" onclick="filterCat('bolos',this)">🎂 Bolos</button>
    <button class="cat-btn" onclick="filterCat('doces',this)">🍬 Doces</button>
    <button class="cat-btn" onclick="filterCat('salgados',this)">🥟 Salgados</button>
    <button class="cat-btn" onclick="filterCat('bebidas',this)">🥤 Bebidas</button>
  </div>
</div>

<!-- MENU -->
<div class="menu-wrap" id="menuWrap"></div>

<!-- CART FAB -->
<button class="cart-fab" onclick="toggleCart()" id="cartFab" style="display:none">
  🛒 Ver Pedido <span class="badge" id="cartBadge">0</span>
</button>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>🛒 Meu Pedido</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty"><div>🛒</div>Seu carrinho está vazio</div>
  </div>
  <div id="cartFooter" style="display:none">
    <div class="form-section">
      <div class="form-group">
        <label>📱 Seu nome</label>
        <input type="text" id="clientName" placeholder="Ex: Maria Silva">
      </div>
      <div class="form-group">
        <label>📍 Endereço de entrega</label>
        <input type="text" id="clientAddr" placeholder="Rua, número, bairro">
      </div>
      <div class="form-group">
        <label>💬 Observações (opcional)</label>
        <textarea id="clientObs" placeholder="Ex: sem cebola, ponto da carne..."></textarea>
      </div>
      <div class="form-group">
        <label>💳 Forma de pagamento</label>
        <div class="payment-opts">
          <div class="pay-opt selected" onclick="selectPay(this,'Pix')"><div>💸</div>Pix</div>
          <div class="pay-opt" onclick="selectPay(this,'Cartão')"><div>💳</div>Cartão</div>
          <div class="pay-opt" onclick="selectPay(this,'Dinheiro')"><div>💵</div>Dinheiro</div>
        </div>
      </div>
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total do pedido</span>
        <strong id="cartTotal">R$ 0,00</strong>
      </div>
      <button class="whatsapp-btn" onclick="sendWhatsApp()">
        <span class="whatsapp-icon">📲</span> Enviar pedido pelo WhatsApp
      </button>
    </div>
  </div>
</div>

<footer>
  <strong>QPastel</strong> – Bolos, Doces & Salgados 🍰<br>
  Feito com ❤️ para você
</footer>

<script>
const WHATSAPP_NUMBER = '5541999999999'; // ← COLOQUE SEU NÚMERO AQUI

const menuData = [
  // BOLOS
  { id:1, cat:'bolos', nome:'Bolo de Chocolate', emoji:'🎂', desc:'Massa fofinha com cobertura de ganache belga', preco:45.00 },
  { id:2, cat:'bolos', nome:'Bolo de Morango', emoji:'🍓', desc:'Creme de baunilha com morangos frescos', preco:50.00 },
  { id:3, cat:'bolos', nome:'Bolo de Cenoura', emoji:'🥕', desc:'Clássico com cobertura de chocolate cremoso', preco:38.00 },
  { id:4, cat:'bolos', nome:'Bolo de Brigadeiro', emoji:'🍫', desc:'Massa de chocolate com recheio brigadeiro gourmet', preco:55.00 },
  { id:5, cat:'bolos', nome:'Bolo Red Velvet', emoji:'❤️', desc:'Massa vermelha com cream cheese suave', preco:60.00 },
  // DOCES
  { id:6, cat:'doces', nome:'Brigadeiro Gourmet', emoji:'🍫', desc:'Unidade | 12 sabores disponíveis', preco:5.00 },
  { id:7, cat:'doces', nome:'Cajuzinho', emoji:'🥜', desc:'Tradicional, feito com amendoim torrado', preco:3.50 },
  { id:8, cat:'doces', nome:'Bem-casado', emoji:'🍮', desc:'Par | Massa suave com doce de leite', preco:8.00 },
  { id:9, cat:'doces', nome:'Trufa de Limão', emoji:'🍋', desc:'Chocolate branco com creme de limão siciliano', preco:6.00 },
  { id:10, cat:'doces', nome:'Palha Italiana', emoji:'🍪', desc:'6 unidades | Com biscoito maizena', preco:18.00 },
  // SALGADOS
  { id:11, cat:'salgados', nome:'Coxinha de Frango', emoji:'🍗', desc:'Unidade | Frango desfiado com catupiry', preco:7.00 },
  { id:12, cat:'salgados', nome:'Esfiha de Carne', emoji:'🫓', desc:'Unidade | Carne moída temperada', preco:6.50 },
  { id:13, cat:'salgados', nome:'Mini Quiche', emoji:'🥧', desc:'Unidade | Creme de queijo com bacon', preco:8.00 },
  { id:14, cat:'salgados', nome:'Bolinha de Queijo', emoji:'🧀', desc:'6 unidades | Queijo minas com temperos', preco:20.00 },
  { id:15, cat:'salgados', nome:'Pastel Assado', emoji:'🥟', desc:'Unidade | Recheios variados (frango/carne/queijo)', preco:9.00 },
  // BEBIDAS
  { id:16, cat:'bebidas', nome:'Suco Natural 500ml', emoji:'🥤', desc:'Laranja, Maracujá ou Limão', preco:10.00 },
  { id:17, cat:'bebidas', nome:'Água 500ml', emoji:'💧', desc:'Gelada', preco:3.00 },
  { id:18, cat:'bebidas', nome:'Refrigerante Lata', emoji:'🥫', desc:'Coca, Guaraná ou Soda', preco:6.00 },
];

let cart = {};
let activeCategory = 'todos';
let activePay = 'Pix';

function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',','); }

function renderMenu(filter='') {
  const wrap = document.getElementById('menuWrap');
  const cats = activeCategory === 'todos'
    ? ['bolos','doces','salgados','bebidas']
    : [activeCategory];
  const catLabels = { bolos:'🎂 Bolos', doces:'🍬 Doces', salgados:'🥟 Salgados', bebidas:'🥤 Bebidas' };

  wrap.innerHTML = '';
  cats.forEach(cat => {
    const items = menuData.filter(i => i.cat === cat &&
      (filter==='' || i.nome.toLowerCase().includes(filter.toLowerCase())));
    if(!items.length) return;
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">${catLabels[cat]}</div><div class="grid" id="grid-${cat}"></div>`;
    wrap.appendChild(sec);
    const grid = sec.querySelector('.grid');
    items.forEach(item => {
      const qty = cart[item.id]||0;
      const card = document.createElement('div');
      card.className='card'; card.id=`card-${item.id}`;
      card.innerHTML = `
        <div class="card-img">${item.emoji}</div>
        <div class="card-body">
          <h3>${item.nome}</h3>
          <p>${item.desc}</p>
          <div class="card-footer">
            <span class="price">${fmt(item.preco)}</span>
            ${qty===0
              ? `<button class="add-btn" onclick="addItem(${item.id})">+ Adicionar</button>`
              : `<div class="qty-ctrl">
                  <button onclick="removeItem(${item.id})">−</button>
                  <span>${qty}</span>
                  <button onclick="addItem(${item.id})">+</button>
                </div>`}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  });
}

function updateCard(id) {
  const item = menuData.find(i=>i.id===id);
  const qty = cart[id]||0;
  const card = document.getElementById(`card-${id}`);
  if(!card) return;
  const footer = card.querySelector('.card-footer');
  footer.innerHTML = `<span class="price">${fmt(item.preco)}</span>
    ${qty===0
      ? `<button class="add-btn" onclick="addItem(${id})">+ Adicionar</button>`
      : `<div class="qty-ctrl">
          <button onclick="removeItem(${id})">−</button>
          <span>${qty}</span>
          <button onclick="addItem(${id})">+</button>
        </div>`}`;
}

function addItem(id){ cart[id]=(cart[id]||0)+1; updateCard(id); updateCartUI(); }
function removeItem(id){
  if(cart[id]>0) cart[id]--;
  if(cart[id]===0) delete cart[id];
  updateCard(id); updateCartUI();
}

function updateCartUI(){
  const total = Object.entries(cart).reduce((s,[id,q])=>{
    const item=menuData.find(i=>i.id==id); return s+item.preco*q;
  },0);
  const count = Object.values(cart).reduce((s,q)=>s+q,0);

  document.getElementById('cartBadge').textContent=count;
  document.getElementById('cartTotal').textContent=fmt(total);
  document.getElementById('cartFab').style.display = count>0?'flex':'none';

  const itemsDiv = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if(count===0){
    itemsDiv.innerHTML='<div class="cart-empty"><div>🛒</div>Seu carrinho está vazio</div>';
    footer.style.display='none';
  } else {
    footer.style.display='block';
    itemsDiv.innerHTML = Object.entries(cart).map(([id,q])=>{
      const item=menuData.find(i=>i.id==id);
      return `<div class="cart-item">
        <div class="cart-item-emoji">${item.emoji}</div>
        <div class="cart-item-info">
          <h4>${item.nome}</h4>
          <p>${fmt(item.preco*q)}</p>
        </div>
        <div class="cart-item-qty">
          <button onclick="removeItem(${id})">−</button>
          <span>${q}</span>
          <button onclick="addItem(${id})">+</button>
        </div>
      </div>`;
    }).join('');
  }
}

function toggleCart(){
  document.getElementById('cartPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function filterCat(cat, btn){
  activeCategory=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu(document.getElementById('searchInput').value);
}

function filterMenu(){ renderMenu(document.getElementById('searchInput').value); }

function selectPay(el, pay){
  activePay=pay;
  document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected');
}

function sendWhatsApp(){
  const name = document.getElementById('clientName').value.trim();
  const addr = document.getElementById('clientAddr').value.trim();
  const obs  = document.getElementById('clientObs').value.trim();
  if(!name){ alert('Por favor, informe seu nome.'); return; }
  if(!addr){ alert('Por favor, informe o endereço de entrega.'); return; }

  const total = Object.entries(cart).reduce((s,[id,q])=>{
    return s+menuData.find(i=>i.id==id).preco*q;
  },0);

  let msg = `🧡 *Novo Pedido – QPastel* 🧡\n\n`;
  msg += `👤 *Nome:* ${name}\n`;
  msg += `📍 *Endereço:* ${addr}\n`;
  msg += `💳 *Pagamento:* ${activePay}\n\n`;
  msg += `📋 *Itens do pedido:*\n`;
  Object.entries(cart).forEach(([id,q])=>{
    const item=menuData.find(i=>i.id==id);
    msg += `• ${item.nome} x${q} – ${fmt(item.preco*q)}\n`;
  });
  msg += `\n💰 *Total: ${fmt(total)}*`;
  if(obs) msg += `\n\n📝 *Obs:* ${obs}`;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

renderMenu();
</script>
