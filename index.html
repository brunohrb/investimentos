<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Pessoal - Bruno Bandeira</title>
    
    <!-- Biblioteca Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-dark: #1e40af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 50%, #e5e7eb 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ========== LOGIN PAGE ========== */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        .login-page::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
            z-index: 0;
        }

        .login-container {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            border: 2px solid #e5e7eb;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-light);
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-white);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        .login-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            display: none;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--danger);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: block;
        }

        /* ========== DASHBOARD PAGE ========== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 50%, #e5e7eb 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .dashboard.active {
            display: block;
        }

        .dashboard::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            z-index: 0;
            pointer-events: none;
        }

        .dashboard::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            z-index: 0;
            pointer-events: none;
        }

        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .logout-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 12px 24px;
            background: #1e40af;
            color: white;
            border: 2px solid #1e40af;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 100;
            font-family: 'Poppins', sans-serif;
        }

        .logout-btn:hover {
            background: #1e3a8a;
            border-color: #1e3a8a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.3);
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: -1px;
            text-shadow: none;
        }

        .dashboard-header p {
            font-size: 16px;
            color: #475569;
            font-weight: 600;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .btn-card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.6s ease-out;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 100%);
            pointer-events: none;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-card:nth-child(1) { animation-delay: 0.1s; }
        .btn-card:nth-child(2) { animation-delay: 0.2s; }
        .btn-card:nth-child(3) { animation-delay: 0.3s; }
        .btn-card:nth-child(4) { animation-delay: 0.4s; }

        .btn-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25), 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .btn-card:active {
            transform: translateY(-6px);
        }

        .btn-icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .btn-card:hover .btn-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .btn-card h2 {
            color: #0f172a;
            font-size: 26px;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .btn-card p {
            color: #1f2937;
            font-size: 14px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Card Variants */
        .btn-card.investimentos {
            background: #f0fdf4;
            border-color: #10b981;
        }

        .btn-card.investimentos:hover {
            border-color: #059669;
            background: #dcfce7;
        }

        .btn-card.saude {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .btn-card.saude:hover {
            border-color: #dc2626;
            background: #fee2e2;
        }

        .btn-card.viagem {
            background: #fffbeb;
            border-color: #f59e0b;
        }

        .btn-card.viagem:hover {
            border-color: #d97706;
            background: #fef3c7;
        }

        .btn-card.seguranca {
            background: #f3e8ff;
            border-color: #a855f7;
        }

        .btn-card.seguranca:hover {
            border-color: #7e22ce;
            background: #e9d5ff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 40px 24px;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .dashboard-header h1 {
                font-size: 36px;
            }

            .buttons-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .btn-card {
                min-height: 240px;
                padding: 30px 20px;
                border-radius: 16px;
            }

            .btn-icon {
                font-size: 48px;
                margin-bottom: 16px;
            }

            .btn-card h2 {
                font-size: 20px;
            }

            .logout-btn {
                top: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 12px;
            }

            .dashboard {
                padding: 30px 16px;
            }

            .dashboard-header {
                margin-bottom: 40px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .login-container {
                padding: 32px 20px;
                border-radius: 16px;
                max-width: 100%;
                margin: 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-header p {
                font-size: 13px;
            }

            .dashboard-header h1 {
                font-size: 28px;
                margin-bottom: 8px;
            }

            .dashboard-header p {
                font-size: 14px;
            }

            .buttons-container {
                gap: 16px;
            }

            .btn-card {
                min-height: 200px;
                padding: 24px 16px;
                border-radius: 14px;
            }

            .btn-icon {
                font-size: 40px;
                margin-bottom: 12px;
            }

            .btn-card h2 {
                font-size: 18px;
                margin-bottom: 8px;
            }

            .btn-card p {
                font-size: 13px;
            }

            .logout-btn {
                padding: 8px 16px;
                font-size: 11px;
                top: 16px;
                right: 16px;
            }

            .dashboard {
                padding: 20px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-header">
                <div class="login-header-icon">👤</div>
                <h1>Bem-vindo</h1>
                <p>Bruno Bandeira</p>
            </div>
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="password">Senha de Acesso</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Digite sua senha"
                        required
                        autofocus
                    >
                </div>
                <button type="submit" class="login-btn">Acessar Plataforma</button>
                <div class="error-message" id="errorMessage"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <button class="logout-btn" onclick="handleLogout()">🚪 Sair</button>
        
        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Bem-vindo, Bruno!</h1>
                <p>Selecione uma categoria para continuar</p>
            </div>

            <div class="buttons-container">
                <a href="investimentos.html" class="btn-card investimentos">
                    <div class="btn-icon">💰</div>
                    <h2>Investimentos</h2>
                    <p>Gerencie seus investimentos e portfólio financeiro</p>
                </a>

                <a href="saude.html" class="btn-card saude">
                    <div class="btn-icon">🏥</div>
                    <h2>Saúde</h2>
                    <p>Acompanhe sua saúde e bem-estar</p>
                </a>

                <a href="#" class="btn-card viagem">
                    <div class="btn-icon">✈️</div>
                    <h2>Viagem</h2>
                    <p>Planeje suas próximas aventuras</p>
                </a>

                <a href="cofre.html" class="btn-card seguranca">
                    <div class="btn-icon">🔒</div>
                    <h2>Segurança</h2>
                    <p>Acesse seu Cofre Digital Seguro</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ CREDENCIAIS DO SUPABASE (mesmo do investimentos)
        const SUPABASE_URL = 'https://fwhsjzkmnfxnlrvspkyr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3aHNqemttbmZ4bmxydnNwa3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0Nzg3MzUsImV4cCI6MjA4MzA1NDczNX0.lT_tHpkxiOQl2HdsFc5VQr_xfkEvoGi101MaITnSLkc';
        
        // Inicializa Supabase
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin(event) {
            event.preventDefault();
            
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const password = passwordInput.value;

            if (!password) {
                errorMessage.textContent = '⚠️ Digite a senha!';
                errorMessage.classList.add('show');
                return;
            }

            try {
                // Busca usuário no Supabase
                const { data, error } = await sb
                    .from('usuarios')
                    .select('*')
                    .eq('username', 'bruno')
                    .eq('senha_hash', password)
                    .single();
                
                if (error || !data) {
                    errorMessage.textContent = '❌ Senha incorreta. Tente novamente.';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                    return;
                }
                
                // Login bem-sucedido
                errorMessage.classList.remove('show');
                sessionStorage.setItem('authenticated', 'true');
                sessionStorage.setItem('username', data.username);
                
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                
                passwordInput.value = '';
                
            } catch (err) {
                console.error('Erro no login:', err);
                errorMessage.textContent = '❌ Erro ao fazer login. Tente novamente.';
                errorMessage.classList.add('show');
            }
        }

        function handleLogout() {
            sessionStorage.removeItem('authenticated');
            sessionStorage.removeItem('username');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').classList.remove('show');
        }

        window.addEventListener('load', function() {
            if (sessionStorage.getItem('authenticated') === 'true') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
            }
        });

        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                document.querySelector('.login-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
