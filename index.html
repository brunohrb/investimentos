<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Pessoal - Bruno Bandeira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-dark: #1e40af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 50%, #e5e7eb 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ========== DASHBOARD PAGE ========== */
        .dashboard {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 50%, #e5e7eb 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            z-index: 0;
            pointer-events: none;
        }

        .dashboard::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            z-index: 0;
            pointer-events: none;
        }

        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .dashboard-header p {
            font-size: 16px;
            color: #475569;
            font-weight: 600;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .btn-card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.6s ease-out;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 100%);
            pointer-events: none;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-card:nth-child(1) { animation-delay: 0.1s; }
        .btn-card:nth-child(2) { animation-delay: 0.2s; }
        .btn-card:nth-child(3) { animation-delay: 0.3s; }
        .btn-card:nth-child(4) { animation-delay: 0.4s; }

        .btn-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25), 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .btn-card:active {
            transform: translateY(-6px);
        }

        .btn-icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .btn-card:hover .btn-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .btn-card h2 {
            color: #0f172a;
            font-size: 26px;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .btn-card p {
            color: #1f2937;
            font-size: 14px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Card Variants */
        .btn-card.investimentos {
            background: #f0fdf4;
            border-color: #10b981;
        }

        .btn-card.investimentos:hover {
            border-color: #059669;
            background: #dcfce7;
        }

        .btn-card.saude {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .btn-card.saude:hover {
            border-color: #dc2626;
            background: #fee2e2;
        }

        .btn-card.viagem {
            background: #fffbeb;
            border-color: #f59e0b;
        }

        .btn-card.viagem:hover {
            border-color: #d97706;
            background: #fef3c7;
        }

        .btn-card.seguranca {
            background: #f3e8ff;
            border-color: #a855f7;
        }

        .btn-card.seguranca:hover {
            border-color: #7e22ce;
            background: #e9d5ff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-header h1 {
                font-size: 36px;
            }

            .dashboard-header p {
                font-size: 15px;
            }

            .buttons-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .btn-card {
                min-height: 180px;
                padding: 24px 20px;
                border-radius: 16px;
            }

            .btn-icon {
                font-size: 42px;
                margin-bottom: 12px;
            }

            .btn-card h2 {
                font-size: 20px;
                margin-bottom: 8px;
            }

            .btn-card p {
                font-size: 13px;
            }

            .dashboard {
                padding: 30px 16px;
            }

            .dashboard-header {
                margin-bottom: 35px;
            }
        }

        @media (max-width: 480px) {
            .dashboard-header h1 {
                font-size: 28px;
                margin-bottom: 8px;
            }

            .dashboard-header p {
                font-size: 14px;
            }

            .buttons-container {
                gap: 16px;
            }

            .btn-card {
                min-height: 160px;
                padding: 20px 16px;
                border-radius: 14px;
            }

            .btn-icon {
                font-size: 38px;
                margin-bottom: 10px;
            }

            .btn-card h2 {
                font-size: 18px;
                margin-bottom: 6px;
            }

            .btn-card p {
                font-size: 12px;
                line-height: 1.5;
            }

            .dashboard {
                padding: 25px 14px;
            }

            .dashboard-header {
                margin-bottom: 30px;
            }
        }

        @media (max-width: 360px) {
            .dashboard-header h1 {
                font-size: 24px;
            }

            .btn-card {
                min-height: 145px;
                padding: 18px 14px;
            }

            .btn-icon {
                font-size: 34px;
                margin-bottom: 8px;
            }

            .btn-card h2 {
                font-size: 16px;
            }

            .btn-card p {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- Dashboard -->
    <div class="dashboard">
        <div class="dashboard-content">
            <div class="dashboard-header">
                <h1>Bem-vindo, Bruno!</h1>
                <p>Selecione uma categoria para continuar</p>
            </div>

            <div class="buttons-container">
                <a href="https://brunohrb.github.io/pessoal/investimentos" class="btn-card investimentos">
                    <div class="btn-icon">💰</div>
                    <h2>Investimentos</h2>
                    <p>Gerencie seus investimentos e portfólio financeiro</p>
                </a>

                <a href="https://brunohrb.github.io/pessoal/treino" class="btn-card saude">
                    <div class="btn-icon">🏥</div>
                    <h2>Saúde</h2>
                    <p>Acompanhe sua saúde e bem-estar</p>
                </a>

                <a href="https://github.com/brunobandeira/viagem" class="btn-card viagem">
                    <div class="btn-icon">✈️</div>
                    <h2>Viagem</h2>
                    <p>Planeje suas próximas aventuras</p>
                </a>

                <a href="https://brunohrb.github.io/pessoal/cofre" class="btn-card seguranca">
                    <div class="btn-icon">🔒</div>
                    <h2>Segurança</h2>
                    <p>Acesse seu Cofre Digital Seguro</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
