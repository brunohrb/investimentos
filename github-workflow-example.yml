name: Deploy com Variáveis de Ambiente

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Injetar variáveis de ambiente no HTML
        run: |
          # Cria um script JavaScript temporário com as variáveis de ambiente
          cat > env-config.js << EOF
          window.ENV_SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.ENV_SUPABASE_KEY = "${{ secrets.SUPABASE_KEY }}";
          EOF
          
          # Injeta o script no HTML antes do fechamento do </head>
          sed -i 's|</head>|<script src="env-config.js"></script>\n</head>|' investimentos.html
      
      - name: Deploy para o servidor
        run: |
          # Aqui você adiciona o comando de deploy do seu servidor
          # Exemplo com SCP:
          # scp investimentos.html env-config.js user@server:/path/to/deploy/
          
          # Ou com rsync:
          # rsync -avz investimentos.html env-config.js user@server:/path/to/deploy/
          
          echo "Arquivos prontos para deploy"
      
      # Se estiver usando GitHub Pages:
      - name: Deploy to GitHub Pages
        if: false  # Remova esta linha se quiser usar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
